<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Engagement COE Presents | 2026 First Half Recap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --deep:#26000b;
      --wine:#5b0016;
      --red:#d71920;
      --rose:#ff6b81;
      --gold:#ffc857;
      --line:rgba(255,255,255,.18);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:"DM Sans",sans-serif;
      color:white;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 12% 12%,rgba(255,200,87,.22),transparent 24%),
        radial-gradient(circle at 85% 18%,rgba(255,107,129,.18),transparent 25%),
        linear-gradient(145deg,var(--deep),var(--wine) 50%,var(--red));
    }

    body{
      min-height:100svh;
      position:relative;
    }

    .orb{
      position:fixed;
      border-radius:50%;
      opacity:.22;
      z-index:0;
      animation:float 9s ease-in-out infinite;
    }

    .orb.one{width:170px;height:170px;left:-60px;top:12%;background:var(--gold)}
    .orb.two{width:220px;height:220px;right:-90px;top:38%;background:var(--rose);animation-delay:2s}
    .orb.three{width:130px;height:130px;left:18%;bottom:4%;background:white;animation-delay:4s}

    .page{
      position:relative;
      z-index:1;
      width:min(1100px,100%);
      margin:0 auto;
      padding:max(24px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));
      min-height:100svh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:24px;
      transition:background .3s ease;
    }

    .hero{
      text-align:center;
      transition:opacity .3s ease,transform .3s ease;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      margin:0 0 14px;
      padding:8px 13px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
      font-size:.74rem;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(3rem,10vw,6.6rem);
      line-height:.9;
      letter-spacing:-.055em;
    }

    h1 span{
      display:block;
      background:linear-gradient(135deg,#fff,#ffe8b0 45%,#ffc857);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .sub{
      max-width:700px;
      margin:18px auto 0;
      color:rgba(255,255,255,.78);
      font-size:clamp(1rem,3.3vw,1.16rem);
    }

    .player-shell{
      position:relative;
      padding:10px;
      border-radius:28px;
      background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.06));
      border:1px solid var(--line);
      box-shadow:0 30px 90px rgba(28,0,8,.42), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(18px);
      overflow:hidden;
      transition:all .35s ease;
    }

    .player-wrap{
      position:relative;
      width:100%;
      aspect-ratio:16/9;
      overflow:hidden;
      border-radius:20px;
      background:#000;
      transition:all .35s ease;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

    .rotate-tip{
      display:none;
      text-align:center;
      margin:-8px auto 0;
      padding:9px 13px;
      width:max-content;
      max-width:90%;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.78);
      font-size:.88rem;
    }

    footer{
      text-align:center;
      color:rgba(255,255,255,.45);
      font-size:.84rem;
    }

    #confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:50;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-18px)}
    }

    @media(max-width:600px) and (orientation:portrait){
      .page{justify-content:flex-start;gap:20px}
      .player-shell{padding:7px;border-radius:22px}
      .player-wrap{border-radius:16px}
      .rotate-tip{display:block}
    }

    @media(orientation:landscape) and (max-height:650px){
      html,body{
        width:100%;
        height:100%;
        min-height:100%;
        background:#000;
        overflow:hidden;
      }

      .orb,.hero,.rotate-tip,footer{
        display:none;
      }

      .page{
        width:100vw;
        height:100dvh;
        max-width:none;
        min-height:100dvh;
        padding:0;
        margin:0;
        gap:0;
        background:#000;
      }

      .player-shell{
        width:100vw;
        height:100dvh;
        padding:0;
        margin:0;
        border:0;
        border-radius:0;
        box-shadow:none;
        background:#000;
        backdrop-filter:none;
      }

      .player-wrap{
        width:100vw;
        height:calc(100dvh - 52px);
        aspect-ratio:auto;
        border-radius:0;
      }

      iframe{
        width:100vw;
        height:calc(100dvh - 52px);
      }

      .replay-row{
        height:52px;
        padding:6px;
        background:#000;
      }

      .replay-btn{
        padding:8px 15px;
      }
    }
  </style>
</head>

<body>
  <canvas id="confetti" aria-hidden="true"></canvas>

  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">✨ Engagement COE Presents</p>
      <h1><span>2026 First Half Recap</span></h1>
      <p class="sub">Six months of moments, milestones and memories, all in one recap.</p>
    </section>

    <section class="player-shell">
      <div class="player-wrap">
        <iframe
          id="recapFrame"
          src="https://drive.google.com/file/d/1xE4toVQX19mGaeeddwOBAWCsrJg2a-U_/preview"
          allow="fullscreen; autoplay"
          allowfullscreen
          webkitallowfullscreen
          title="2026 First Half Recap">
        </iframe>
      </div>
</section>

    <p class="rotate-tip">💡 You can rotate your phone for a wider view.</p>

    <footer>Made by COE Engagement</footer>
  </main>

  <script>
    const frame = document.getElementById('recapFrame');

    const canvas=document.getElementById('confetti');
    const ctx=canvas.getContext('2d');
    let pieces=[];
    let raf=null;

    function resizeCanvas(){
      canvas.width=innerWidth*devicePixelRatio;
      canvas.height=innerHeight*devicePixelRatio;
      canvas.style.width=innerWidth+'px';
      canvas.style.height=innerHeight+'px';
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }

    function burstConfetti(amount=100){
      const colors=['#ffc857','#ffffff','#ff6b81','#ffd6de','#ff9f1c'];
      for(let i=0;i<amount;i++){
        pieces.push({
          x:innerWidth/2+(Math.random()-.5)*170,
          y:innerHeight*.24,
          vx:(Math.random()-.5)*10,
          vy:-3-Math.random()*7,
          g:.16+Math.random()*.07,
          r:3+Math.random()*5,
          a:1,
          spin:(Math.random()-.5)*.25,
          rot:Math.random()*Math.PI,
          color:colors[Math.floor(Math.random()*colors.length)]
        });
      }
      if(!raf) animateConfetti();
    }

    function animateConfetti(){
      ctx.clearRect(0,0,innerWidth,innerHeight);
      pieces.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.spin;p.a-=.009;
        ctx.save();
        ctx.globalAlpha=Math.max(p.a,0);
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
        ctx.restore();
      });
      pieces=pieces.filter(p=>p.a>0&&p.y<innerHeight+30);
      if(pieces.length){
        raf=requestAnimationFrame(animateConfetti);
      }else{
        cancelAnimationFrame(raf);
        raf=null;
        ctx.clearRect(0,0,innerWidth,innerHeight);
      }
    }

    resizeCanvas();
    addEventListener('resize',resizeCanvas);
  </script>
</body>
</html>
