<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7a0019" />
  <title>GCS&I COE 2026 First Half Recap</title>
  <meta name="description" content="GCS&I COE 2026 First Half Recap." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --deep:#3b0011;
      --mid:#7a0019;
      --red:#d71920;
      --gold:#ffc857;
      --white:#fff;
      --line:rgba(255,255,255,.2);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:"DM Sans",sans-serif;
      color:white;
      background:
        radial-gradient(circle at 18% 14%,rgba(255,200,87,.18),transparent 24%),
        linear-gradient(145deg,var(--deep),var(--mid) 52%,var(--red));
      overflow-x:hidden;
    }

    body{
      min-height:100svh;
      display:flex;
      flex-direction:column;
    }

    .page{
      width:min(1100px,100%);
      margin:0 auto;
      padding:
        max(22px,env(safe-area-inset-top))
        16px
        max(20px,env(safe-area-inset-bottom));
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:22px;
    }

    .hero{
      text-align:center;
      padding:8px 8px 0;
    }

    .eyebrow{
      margin:0 0 10px;
      font-size:.75rem;
      font-weight:700;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
    }

    h1{
      margin:0;
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(2.4rem,10vw,5.8rem);
      line-height:.96;
      letter-spacing:-.05em;
    }

    .sub{
      max-width:680px;
      margin:16px auto 0;
      color:rgba(255,255,255,.78);
      font-size:clamp(.98rem,3.4vw,1.15rem);
      line-height:1.55;
    }

    .watch-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:20px;
      padding:14px 22px;
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,#fff2c5,var(--gold));
      color:#4f0012;
      font-weight:800;
      text-decoration:none;
      cursor:pointer;
      box-shadow:0 14px 36px rgba(255,200,87,.24);
    }

    .player-card{
      padding:8px;
      border-radius:22px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.11);
      backdrop-filter:blur(16px);
      box-shadow:0 24px 60px rgba(30,0,10,.34);
    }

    .player-wrap{
      position:relative;
      width:100%;
      aspect-ratio:16/9;
      overflow:hidden;
      border-radius:16px;
      background:#120006;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

    .viewer-tools{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .tool-btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.09);
      color:white;
      padding:11px 14px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
    }

    .tool-btn:active{transform:scale(.98)}

    .rotate-note{
      text-align:center;
      color:rgba(255,255,255,.65);
      font-size:.88rem;
      line-height:1.45;
      margin:0 10px;
    }

    footer{
      text-align:center;
      color:rgba(255,255,255,.5);
      font-size:.84rem;
      padding-top:4px;
    }

    #confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:50;
    }

    @media (orientation:landscape) and (max-height:650px){
      .page{
        width:100%;
        max-width:none;
        padding:8px;
        gap:8px;
        justify-content:flex-start;
      }

      .hero{
        display:none;
      }

      .player-card{
        border-radius:14px;
        padding:4px;
      }

      .player-wrap{
        height:calc(100svh - 62px);
        aspect-ratio:auto;
        border-radius:10px;
      }

      .viewer-tools{
        margin-top:6px;
      }

      .rotate-note,footer{
        display:none;
      }
    }

    @media (max-width:600px){
      .page{
        justify-content:flex-start;
      }

      .hero{
        padding-top:12px;
      }

      .player-card{
        margin-top:4px;
      }
    }

    @media (prefers-reduced-motion:reduce){
      *{scroll-behavior:auto!important}
    }
  </style>
</head>

<body>
  <canvas id="confetti" aria-hidden="true"></canvas>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">GCS&amp;I COE presents</p>
      <h1>2026 First Half Recap</h1>
      <p class="sub">Tap play, turn your phone sideways, and enjoy the recap in full screen.</p>
      <a class="watch-btn" href="#recap" id="watchBtn">▶ Watch the Recap</a>
    </section>

    <section class="player-card" id="recap" aria-label="GCS&I COE 2026 First Half Recap">
      <div class="player-wrap" id="playerWrap">
        <iframe
          id="recapFrame"
          loading="lazy"
          src="https://www.canva.com/design/DAHOxlNI2Pc/hJ-0WrZ6fAN3uDyI5ax_Fg/watch?embed"
          allowfullscreen="allowfullscreen"
          allow="fullscreen"
          title="GCS&I COE 2026 First Half Recap">
        </iframe>
      </div>

      <div class="viewer-tools">
        <button class="tool-btn" id="fullscreenBtn">⛶ Full Screen</button>
        <button class="tool-btn" id="rotateBtn">↻ Rotate to Landscape</button>
      </div>
    </section>

    <p class="rotate-note">For the best experience on mobile, rotate your phone to landscape and tap Full Screen.</p>

    <footer>Made by COE Engagement</footer>
  </main>

  <script>
    const watchBtn = document.getElementById('watchBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const rotateBtn = document.getElementById('rotateBtn');
    const playerWrap = document.getElementById('playerWrap');
    const recapFrame = document.getElementById('recapFrame');

    watchBtn.addEventListener('click', () => {
      burstConfetti(140);
    });

    recapFrame.addEventListener('load', () => {
      setTimeout(() => burstConfetti(90), 400);
    });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (playerWrap.requestFullscreen) {
          await playerWrap.requestFullscreen();
        } else if (playerWrap.webkitRequestFullscreen) {
          playerWrap.webkitRequestFullscreen();
        }
      } catch (e) {}
    });

    rotateBtn.addEventListener('click', async () => {
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        }
      } catch (e) {}
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let pieces = [];
    let raf = null;

    function resizeCanvas(){
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }

    function burstConfetti(amount=100){
      const colors = ['#ffc857','#ffffff','#ff6b81','#ffd6de','#ff9f1c'];
      for(let i=0;i<amount;i++){
        pieces.push({
          x: window.innerWidth/2 + (Math.random()-.5)*160,
          y: window.innerHeight*.28,
          vx: (Math.random()-.5)*10,
          vy: -3-Math.random()*7,
          g: .16+Math.random()*.07,
          r: 3+Math.random()*5,
          a: 1,
          spin: (Math.random()-.5)*.25,
          rot: Math.random()*Math.PI,
          color: colors[Math.floor(Math.random()*colors.length)]
        });
      }
      if(!raf) animateConfetti();
    }

    function animateConfetti(){
      ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
      pieces.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.g;
        p.rot += p.spin;
        p.a -= .009;

        ctx.save();
        ctx.globalAlpha = Math.max(p.a,0);
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
        ctx.restore();
      });

      pieces = pieces.filter(p=>p.a>0 && p.y<window.innerHeight+30);

      if(pieces.length){
        raf = requestAnimationFrame(animateConfetti);
      }else{
        cancelAnimationFrame(raf);
        raf = null;
        ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
      }
    }

    resizeCanvas();
    window.addEventListener('resize',resizeCanvas);
  </script>
</body>
</html>
