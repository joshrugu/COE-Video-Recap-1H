<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6e0019">
  <title>Engagement COE Presents | 2026 First Half Recap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --deep:#26000b;
      --wine:#5b0016;
      --red:#d71920;
      --gold:#ffc857;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:"DM Sans",sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 15% 12%,rgba(255,200,87,.2),transparent 24%),
        radial-gradient(circle at 85% 18%,rgba(255,107,129,.15),transparent 24%),
        linear-gradient(145deg,var(--deep),var(--wine) 50%,var(--red));
    }

    body{
      min-height:100svh;
    }

    .page{
      width:min(1100px,100%);
      min-height:100svh;
      margin:0 auto;
      padding:max(24px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom));
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:24px;
    }

    .hero{
      text-align:center;
    }

    .eyebrow{
      display:inline-block;
      margin:0 0 14px;
      padding:8px 13px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      background:rgba(255,255,255,.08);
      font-size:.74rem;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    h1{
      margin:0;
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(3rem,10vw,6.4rem);
      line-height:.92;
      letter-spacing:-.05em;
      background:linear-gradient(135deg,#fff,#ffe8b0 50%,var(--gold));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .sub{
      max-width:700px;
      margin:18px auto 0;
      color:rgba(255,255,255,.76);
      font-size:clamp(1rem,3.3vw,1.15rem);
      line-height:1.5;
    }

    .video-card{
      width:100%;
      padding:10px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:26px;
      background:rgba(255,255,255,.1);
      box-shadow:0 28px 75px rgba(20,0,7,.38);
    }

    .video-frame{
      width:100%;
      aspect-ratio:16/9;
      overflow:hidden;
      border-radius:18px;
      background:#000;
    }

    .video-frame iframe{
      display:block;
      width:100%;
      height:100%;
      border:0;
    }

    .rotate-tip{
      display:none;
      margin:0 auto;
      padding:9px 13px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.78);
      font-size:.88rem;
      text-align:center;
    }

    footer{
      text-align:center;
      color:rgba(255,255,255,.45);
      font-size:.84rem;
    }

    @media(max-width:600px) and (orientation:portrait){
      .page{
        justify-content:flex-start;
        gap:20px;
      }

      .video-card{
        padding:7px;
        border-radius:21px;
      }

      .video-frame{
        border-radius:15px;
      }

      .rotate-tip{
        display:block;
      }
    }

    @media(orientation:landscape) and (max-height:650px){
      html,body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#000;
      }

      .page{
        width:100vw;
        height:100dvh;
        min-height:100dvh;
        max-width:none;
        padding:0;
        margin:0;
        display:grid;
        place-items:center;
        background:#000;
      }

      .hero,
      .rotate-tip,
      footer{
        display:none;
      }

      .video-card{
        width:min(100vw,calc(100dvh * 16 / 9));
        height:min(100dvh,calc(100vw * 9 / 16));
        padding:0;
        border:0;
        border-radius:0;
        box-shadow:none;
        background:#000;
      }

      .video-frame{
        width:100%;
        height:100%;
        aspect-ratio:16/9;
        border-radius:0;
      }

      .video-frame iframe{
        width:100%;
        height:100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">✨ Engagement COE Presents</p>
      <h1>2026 First Half Recap</h1>
      <p class="sub">Six months of moments, milestones and memories, all in one recap.</p>
    </section>

    <section class="video-card" aria-label="2026 First Half Recap video">
      <div class="video-frame">
        <iframe
          src="https://drive.google.com/file/d/1xE4toVQX19mGaeeddwOBAWCsrJg2a-U_/preview"
          allow="autoplay; fullscreen"
          allowfullscreen
          title="2026 First Half Recap">
        </iframe>
      </div>
    </section>

    <p class="rotate-tip">💡 Rotate your phone for a wider view.</p>

    <footer>Made by COE Engagement</footer>
  </main>
</body>
</html>
